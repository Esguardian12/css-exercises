<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Shared class for all odd elements -->
    <p class="odd-item">Number 1 - I'm a class!</p>

    <!-- Unique ID for the second element -->
    <div id="element-two">Number 2 - I'm one ID.</div>

    <!-- Multiple classes: get the odd styles AND the custom cooler size-->
    <p class="odd-item cooler-item">Number 3 - I'm a class, but cooler!</p>

    <!-- Unique ID for the fourth element -->
    <div id="element-four">Number 4 - I'm another ID.</div>

    <!-- Shared class for all odd elements -->
    <p class="odd-item">Number 5 - I'm a class!</p>
  </body>
</html>
